<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUEUEWAVE — DJ Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#020408;--bg2:#040a10;--surface:#060e18;--card:#0a1422;--border:#0f2040;--border2:#1a3560;--cyan:#00f5ff;--cyan-dim:rgba(0,245,255,0.09);--magenta:#ff00aa;--mag-dim:rgba(255,0,170,0.09);--lime:#aaff00;--lime-dim:rgba(170,255,0,0.07);--red:#ff3c6e;--gold:#ffcc00;--text:#c0d8f0;--muted:#2a4060;--muted2:#4a6080;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;cursor:none;}
#cur{position:fixed;width:10px;height:10px;background:var(--magenta);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;transition:background .2s,transform .1s;}
#cur-r{position:fixed;width:32px;height:32px;border:1px solid rgba(255,0,170,0.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s,transform .18s cubic-bezier(0.23,1,0.32,1);}
body:has(button:hover) #cur,body:has(a:hover) #cur{transform:translate(-50%,-50%) scale(2.2);background:var(--cyan);}
body:has(button:hover) #cur-r,body:has(a:hover) #cur-r{width:54px;height:54px;border-color:rgba(0,245,255,0.4);}
#gc{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.25;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:900;}
body::before{content:'';position:fixed;inset:-200%;width:400%;height:400%;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:1;animation:grain .4s steps(1) infinite;}
@keyframes grain{0%,100%{transform:translate(0,0)}20%{transform:translate(-5%,10%)}40%{transform:translate(10%,-5%)}60%{transform:translate(-8%,15%)}80%{transform:translate(12%,8%)}}

/* LOGIN */
.screen{display:none;min-height:100vh;align-items:center;justify-content:center;position:relative;z-index:10;}
.screen.on{display:flex;}
#s-login{flex-direction:column;padding:40px 20px;}
.auth-box{width:100%;max-width:400px;}
.brand{font-family:'Orbitron',sans-serif;font-size:clamp(2rem,7vw,3.4rem);font-weight:900;letter-spacing:.05em;margin-bottom:6px;}
.brand .q{color:var(--magenta);text-shadow:0 0 20px rgba(255,0,170,0.5);}
.brand .w{color:var(--cyan);text-shadow:0 0 20px rgba(0,245,255,0.4);}
.brand-sub{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--muted2);letter-spacing:.15em;margin-bottom:40px;}
.sup-badge{display:inline-block;padding:2px 8px;background:var(--magenta);color:#fff;font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:.1em;border-radius:2px;vertical-align:middle;margin-left:6px;}
.flbl{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--muted2);letter-spacing:.15em;text-transform:uppercase;margin-bottom:7px;display:block;}
.finp{width:100%;padding:12px 15px;background:var(--card);border:1px solid var(--border2);border-radius:3px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:500;outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:16px;}
.finp:focus{border-color:var(--magenta);box-shadow:0 0 0 2px rgba(255,0,170,0.07);}
.btn-go{width:100%;padding:13px;background:linear-gradient(135deg,var(--magenta),var(--cyan));color:#fff;border:none;border-radius:3px;font-family:'Orbitron',sans-serif;font-weight:700;font-size:.7rem;letter-spacing:.15em;cursor:none;transition:opacity .2s,transform .2s;}
.btn-go:hover{opacity:.9;transform:translateY(-1px);}
.hint{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--muted2);text-align:center;margin-top:12px;letter-spacing:.06em;}
.back-lnk{display:inline-flex;align-items:center;gap:5px;background:none;border:none;font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--muted2);cursor:none;margin-top:20px;transition:color .2s;padding:0;letter-spacing:.08em;}
.back-lnk:hover{color:var(--magenta);}

/* MAIN APP */
#mainApp{display:none;position:relative;z-index:10;}
nav{padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;background:rgba(2,4,8,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;}
.n-logo{font-family:'Orbitron',sans-serif;font-size:.9rem;font-weight:900;letter-spacing:.1em;}
.n-logo .q{color:var(--magenta);text-shadow:0 0 15px rgba(255,0,170,0.4);}
.n-logo .w{color:var(--cyan);}
.n-logo .dj{display:inline-block;padding:2px 7px;background:var(--magenta);color:#fff;font-size:.55rem;border-radius:2px;margin-left:5px;vertical-align:middle;letter-spacing:.08em;}
.n-right{display:flex;align-items:center;gap:10px;}
.dj-pill{display:flex;align-items:center;gap:7px;padding:4px 12px 4px 4px;background:var(--card);border:1px solid var(--border2);border-radius:20px;}
.dj-av{width:26px;height:26px;border-radius:50%;background:var(--magenta);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:900;font-size:.6rem;}
.dj-nm{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--text);}
.n-btn{padding:5px 13px;background:transparent;border:1px solid var(--border2);border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.08em;color:var(--muted2);cursor:none;transition:all .2s;}
.n-btn:hover{border-color:var(--red);color:var(--red);}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 14px;overflow-x:auto;}
.tabs::-webkit-scrollbar{height:0;}
.tb{padding:13px 16px;font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.12em;color:var(--muted2);cursor:none;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;}
.tb.on{color:var(--magenta);border-bottom-color:var(--magenta);}

/* PANES */
.pane{display:none;padding:20px 16px 80px;max-width:860px;margin:0 auto;}
.pane.on{display:block;}
.prow{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.pt{font-family:'Orbitron',sans-serif;font-size:.95rem;font-weight:700;color:#fff;letter-spacing:.04em;}
.ps{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--muted2);letter-spacing:.1em;margin-top:4px;}

/* EVENTS */
.ev-card{position:relative;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;overflow:hidden;transition:border-color .25s;}
.ev-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--magenta);transform:scaleY(0);transition:transform .25s;}
.ev-card:hover{border-color:rgba(255,0,170,0.3);}
.ev-card:hover::before{transform:scaleY(1);}
.ev-nm{font-family:'Orbitron',sans-serif;font-size:.82rem;font-weight:700;color:#fff;}
.ev-mt{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--muted2);margin-top:4px;letter-spacing:.06em;}
.live-pip{display:inline-flex;align-items:center;gap:5px;font-family:'Share Tech Mono',monospace;font-size:.56rem;color:var(--lime);background:rgba(170,255,0,0.07);border:1px solid rgba(170,255,0,0.2);padding:2px 8px;border-radius:2px;}
.pip-dot{width:5px;height:5px;border-radius:50%;background:var(--lime);animation:pip 1.2s ease-in-out infinite;}
@keyframes pip{0%,100%{opacity:1}50%{opacity:.3}}
.ended-pip{display:inline-flex;align-items:center;font-family:'Share Tech Mono',monospace;font-size:.56rem;color:var(--muted2);background:rgba(40,60,90,0.3);border:1px solid var(--border);padding:2px 8px;border-radius:2px;}
.ev-acts{display:flex;gap:6px;flex-shrink:0;}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.08em;cursor:none;border:none;transition:all .2s;text-transform:uppercase;}
.btn-m{background:var(--mag-dim);color:var(--magenta);border:1px solid rgba(255,0,170,0.25);}
.btn-m:hover{background:var(--magenta);color:#fff;}
.btn-c{background:var(--cyan-dim);color:var(--cyan);border:1px solid rgba(0,245,255,0.25);}
.btn-c:hover{background:var(--cyan);color:#000;}
.btn-l{background:var(--lime-dim);color:var(--lime);border:1px solid rgba(170,255,0,0.2);}
.btn-l:hover{background:var(--lime);color:#000;}
.btn-r{background:rgba(255,60,110,0.08);color:var(--red);border:1px solid rgba(255,60,110,0.25);}
.btn-r:hover{background:var(--red);color:#fff;}
.btn-g{background:rgba(20,40,70,0.5);color:var(--muted2);border:1px solid var(--border2);}
.btn-g:hover{border-color:var(--border2);color:var(--text);}
.btn-sm{padding:5px 10px;font-size:.56rem;}
.btn-new{padding:9px 18px;background:linear-gradient(135deg,var(--magenta),var(--cyan));color:#fff;border:none;border-radius:3px;font-family:'Orbitron',sans-serif;font-weight:700;font-size:.62rem;letter-spacing:.12em;cursor:none;transition:opacity .2s,transform .2s;}
.btn-new:hover{opacity:.88;transform:translateY(-1px);}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;}
.stat-box{padding:14px 12px;background:var(--card);border:1px solid var(--border);border-radius:4px;text-align:center;}
.stat-num{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:900;line-height:1;}
.stat-lbl{font-family:'Share Tech Mono',monospace;font-size:.55rem;color:var(--muted2);margin-top:4px;letter-spacing:.1em;}
.stat-box:nth-child(1) .stat-num{color:var(--cyan);}
.stat-box:nth-child(2) .stat-num{color:var(--lime);}
.stat-box:nth-child(3) .stat-num{color:var(--muted2);}
.stat-box:nth-child(4) .stat-num{color:var(--magenta);}

/* QUEUE CARDS */
.qc{display:flex;align-items:center;gap:11px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:4px;margin-bottom:7px;transition:border-color .2s;}
.qc:hover{border-color:var(--border2);}
.qc.playing{border-color:rgba(170,255,0,0.4);background:rgba(170,255,0,0.03);}
.qc.played{opacity:.35;}
.rank-n{font-family:'Orbitron',sans-serif;font-size:.9rem;font-weight:900;color:var(--muted);min-width:26px;text-align:center;flex-shrink:0;}
.rank-n.rp{color:var(--lime);}
.rank-n.rd{color:var(--muted);}
.qthumb{width:46px;height:46px;border-radius:6px;object-fit:cover;background:var(--surface);flex-shrink:0;}
.qinfo{flex:1;min-width:0;}
.qt{font-weight:600;font-size:.88rem;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qa{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--muted2);margin-top:3px;}
.qr{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--muted);margin-top:2px;}
.votes-box{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:3px;flex-shrink:0;}
.vu{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--lime);}
.vd{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--magenta);}
.vsep{color:var(--border2);font-size:.8rem;}
.qacts{display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:200px;}
.chip{font-family:'Share Tech Mono',monospace;font-size:.54rem;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:2px;white-space:nowrap;}
.chip-p{background:rgba(170,255,0,0.1);color:var(--lime);border:1px solid rgba(170,255,0,0.25);}
.chip-d{background:rgba(40,60,90,0.3);color:var(--muted2);border:1px solid var(--border);}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-bg.on{display:flex;}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:6px;padding:32px;width:min(420px,92vw);position:relative;}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--magenta),var(--cyan));}
.modal-title{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;color:#fff;margin-bottom:20px;letter-spacing:.04em;}
.modal-acts{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}

/* MISC */
.spin-w{display:flex;justify-content:center;padding:40px;}
.spin{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--magenta);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 20px;}
.e-ico{font-size:2.2rem;margin-bottom:10px;}
.e-msg{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--muted2);letter-spacing:.1em;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border2);border-radius:4px;padding:10px 20px;font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:.08em;z-index:9999;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--lime);color:var(--lime);}
.toast.err{border-color:var(--red);color:var(--red);}
.section-line{display:flex;align-items:center;gap:10px;margin:20px 0 14px;}
.sl-label{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--muted2);letter-spacing:.12em;white-space:nowrap;}
.sl-line{flex:1;height:1px;background:var(--border);}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr);}.qacts{max-width:none;}}
</style>
</head>
<body>
<div id="cur"></div><div id="cur-r"></div>
<canvas id="gc"></canvas>

<!-- LOGIN -->
<div class="screen on" id="s-login">
  <div class="auth-box">
    <div class="brand"><span class="q">QUEUE</span><span class="w">WAVE</span></div>
    <div class="brand-sub">// dj control panel — login or register</div>
    <label class="flbl">DJ Name</label>
    <input class="finp" type="text" id="djName" placeholder="Your DJ handle" maxlength="40">
    <label class="flbl">Password</label>
    <input class="finp" type="password" id="djPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')djLogin()">
    <button class="btn-go" onclick="djLogin()">ACCESS DASHBOARD →</button>
    <p class="hint">First time? Your account is created automatically.</p>
    <button class="back-lnk" onclick="location.href='audience.html'">← AUDIENCE VIEW</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp">
  <nav>
    <div class="n-logo"><span class="q">QUEUE</span><span class="w">WAVE</span><span class="dj">DJ</span></div>
    <div class="n-right">
      <div class="dj-pill">
        <div class="dj-av" id="djAv">?</div>
        <span class="dj-nm" id="djDisp">—</span>
      </div>
      <button class="n-btn" onclick="djLogout()">LOGOUT</button>
    </div>
  </nav>
  <div class="tabs">
    <button class="tb on" id="t-events" onclick="goTab('events')">MY EVENTS</button>
    <button class="tb" id="t-queue" onclick="goTab('queue')">QUEUE</button>
  </div>

  <div class="pane on" id="p-events">
    <div class="prow">
      <div><div class="pt">MY EVENTS</div><div class="ps">// create and manage your dj sessions</div></div>
      <button class="btn-new" onclick="openModal('newEvModal')">+ NEW EVENT</button>
    </div>
    <div id="evList"></div>
  </div>

  <div class="pane" id="p-queue">
    <div class="prow">
      <div><div class="pt" id="qEvTitle">QUEUE</div><div class="ps" id="qEvSub">// select an event first</div></div>
    </div>
    <div class="stats-row" id="statsRow" style="display:none">
      <div class="stat-box"><div class="stat-num" id="st-queued">0</div><div class="stat-lbl">QUEUED</div></div>
      <div class="stat-box"><div class="stat-num" id="st-playing">0</div><div class="stat-lbl">PLAYING</div></div>
      <div class="stat-box"><div class="stat-num" id="st-played">0</div><div class="stat-lbl">PLAYED</div></div>
      <div class="stat-box"><div class="stat-num" id="st-total">0</div><div class="stat-lbl">TOTAL</div></div>
    </div>
    <div id="qList"></div>
  </div>
</div>

<!-- NEW EVENT MODAL -->
<div class="modal-bg" id="newEvModal">
  <div class="modal">
    <div class="modal-title">CREATE NEW EVENT</div>
    <label class="flbl">Event Name</label>
    <input class="finp" type="text" id="evNameIn" placeholder="e.g. Friday Night Bash" style="margin-bottom:0">
    <div class="modal-acts">
      <button class="btn btn-g" onclick="closeModal('newEvModal')">Cancel</button>
      <button class="btn btn-m" onclick="createEvent()">CREATE →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc, addDoc, getDocs, deleteDoc, onSnapshot, updateDoc, query, orderBy, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── PASTE YOUR FIREBASE CONFIG ──
const firebaseConfig = {
    apiKey: "AIzaSyAseFAn83wwnnnxTbNkLetiBDrwsrJj0AM",
    authDomain: "dj-app-cb03f.firebaseapp.com",
    projectId: "dj-app-cb03f",
    storageBucket: "dj-app-cb03f.firebasestorage.app",
    messagingSenderId: "377882282531",
    appId: "1:377882282531:web:53565cb5e44b96b2e33f96",
    measurementId: "G-EY08TTYJBZ"
};
// ────────────────────────────────

const app=initializeApp(firebaseConfig),db=getFirestore(app);
let dj=null,activeEvt=null,qUnsub=null;

// CURSOR
const cur=document.getElementById('cur'),cr=document.getElementById('cur-r');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function ar(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;cr.style.left=rx+'px';cr.style.top=ry+'px';requestAnimationFrame(ar);})();

// GRID (magenta tint for DJ)
const gc=document.getElementById('gc'),gx=gc.getContext('2d');
function rsz(){gc.width=window.innerWidth;gc.height=window.innerHeight;}rsz();window.addEventListener('resize',rsz);
let gt=0;
(function dg(){gx.clearRect(0,0,gc.width,gc.height);const sz=60,cols=Math.ceil(gc.width/sz)+1,rows=Math.ceil(gc.height/sz)+1;const ox=(gt*.25)%sz,oy=(gt*.12)%sz;gx.lineWidth=.5;for(let x=0;x<cols;x++){const px=x*sz-ox;gx.strokeStyle=`rgba(255,0,170,${.04+Math.sin(gt*.02+x*.3)*.016})`;gx.beginPath();gx.moveTo(px,0);gx.lineTo(px,gc.height);gx.stroke();}for(let y=0;y<rows;y++){const py=y*sz-oy;gx.strokeStyle=`rgba(0,245,255,${.025+Math.sin(gt*.02+y*.4)*.01})`;gx.beginPath();gx.moveTo(0,py);gx.lineTo(gc.width,py);gx.stroke();}gt++;requestAnimationFrame(dg);})();

window.showS=id=>{document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById(id)?.classList.add('on');};
function toast(msg,type='ok',ms=2500){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',ms);}

// AUTH
window.djLogin=async()=>{
  const name=document.getElementById('djName').value.trim();
  const pass=document.getElementById('djPass').value;
  if(!name||!pass)return toast('Enter DJ name and password','err');
  const id=name.toLowerCase().replace(/\s+/g,'_');
  const ref=doc(db,'djs',id);
  const snap=await getDoc(ref);
  if(!snap.exists()){
    await setDoc(ref,{name,password:btoa(pass),createdAt:serverTimestamp()});
    dj={id,name};
  }else{
    if(atob(snap.data().password)!==pass)return toast('Wrong password','err');
    dj={id,name:snap.data().name};
  }
  document.getElementById('mainApp').style.display='block';
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById('djDisp').textContent=dj.name;
  document.getElementById('djAv').textContent=dj.name[0].toUpperCase();
  loadEvents();
};
window.djLogout=()=>{if(qUnsub)qUnsub();dj=activeEvt=null;document.getElementById('mainApp').style.display='none';showS('s-login');};

// EVENTS
async function loadEvents(){
  const el=document.getElementById('evList');
  el.innerHTML='<div class="spin-w"><div class="spin"></div></div>';
  const snap=await getDocs(query(collection(db,'events'),where('djId','==',dj.id)));
  const evs=[];snap.forEach(d=>evs.push({id:d.id,...d.data()}));
  evs.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  if(!evs.length){el.innerHTML='<div class="empty"><div class="e-ico">🎵</div><div class="e-msg">NO EVENTS YET — CREATE ONE!</div></div>';return;}
  el.innerHTML='';
  evs.forEach(ev=>{
    const isLive=ev.status==='live';
    const c=document.createElement('div');c.className='ev-card';
    c.innerHTML=`<div style="flex:1;min-width:0;">
        <div class="ev-nm">${ev.name}</div>
        <div class="ev-mt">${isLive?`<span class="live-pip"><span class="pip-dot"></span>LIVE</span>`:`<span class="ended-pip">ENDED</span>`}</div>
      </div>
      <div class="ev-acts">
        <button class="btn btn-sm btn-g" onclick="openQueue('${ev.id}','${ev.name}')">QUEUE</button>
        ${isLive
          ?`<button class="btn btn-sm btn-r" onclick="endEvent('${ev.id}')">END</button>`
          :`<button class="btn btn-sm btn-l" onclick="goLive('${ev.id}')">GO LIVE</button>`}
      </div>`;
    el.appendChild(c);
  });
}

window.openModal=id=>{document.getElementById(id).classList.add('on');};
window.closeModal=id=>{document.getElementById(id).classList.remove('on');};

window.createEvent=async()=>{
  const name=document.getElementById('evNameIn').value.trim();
  if(!name)return toast('Enter event name','err');
  await addDoc(collection(db,'events'),{name,djId:dj.id,djName:dj.name,status:'live',createdAt:serverTimestamp()});
  document.getElementById('evNameIn').value='';
  closeModal('newEvModal');toast('Event created! 🎉');loadEvents();
};
window.goLive=async id=>{await updateDoc(doc(db,'events',id),{status:'live'});toast('Event is live!');loadEvents();};
window.endEvent=async id=>{
  if(!confirm('End this event?'))return;
  await updateDoc(doc(db,'events',id),{status:'ended'});
  if(activeEvt?.id===id){if(qUnsub)qUnsub();activeEvt=null;}
  toast('Event ended');loadEvents();
};

// QUEUE
window.openQueue=(evId,evName)=>{
  activeEvt={id:evId,name:evName};
  document.getElementById('qEvTitle').textContent=evName;
  document.getElementById('qEvSub').textContent='// live queue management';
  document.getElementById('statsRow').style.display='grid';
  goTab('queue');subQ();
};
window.goTab=t=>{
  document.querySelectorAll('.tb').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(e=>e.classList.remove('on'));
  document.getElementById('t-'+t)?.classList.add('on');
  document.getElementById('p-'+t)?.classList.add('on');
};
function subQ(){
  if(qUnsub)qUnsub();
  const q=query(collection(db,'events',activeEvt.id,'queue'),orderBy('rank'));
  qUnsub=onSnapshot(q,snap=>{
    const data=[];snap.forEach(d=>data.push({id:d.id,...d.data()}));
    renderQ(data);updateStats(data);
  });
}
function updateStats(data){
  document.getElementById('st-queued').textContent=data.filter(s=>s.status==='queued').length;
  document.getElementById('st-playing').textContent=data.filter(s=>s.status==='playing').length;
  document.getElementById('st-played').textContent=data.filter(s=>s.status==='played').length;
  document.getElementById('st-total').textContent=data.length;
}
function renderQ(data){
  const el=document.getElementById('qList');
  if(!data.length){el.innerHTML='<div class="empty"><div class="e-ico">🎤</div><div class="e-msg">QUEUE EMPTY</div></div>';return;}
  el.innerHTML='';let n=1;
  data.forEach((s,idx)=>{
    const ip=s.status==='playing',id=s.status==='played';
    const c=document.createElement('div');c.className='qc'+(ip?' playing':id?' played':'');
    const rankDisp=ip?'▶':id?'✓':`#${n++}`;
    const rankCls=ip?'rp':id?'rd':'';
    c.innerHTML=`<div class="rank-n ${rankCls}">${rankDisp}</div>
      <img class="qthumb" src="${s.artwork||''}" loading="lazy" onerror="this.style.background='var(--surface)'">
      <div class="qinfo">
        <div class="qt">${s.title}</div>
        <div class="qa">${s.artist}</div>
        <div class="qr">req. ${s.requestedBy||'—'}</div>
      </div>
      <div class="votes-box"><span class="vu">👍 ${s.upvotes||0}</span><span class="vsep">|</span><span class="vd">👎 ${s.downvotes||0}</span></div>
      <div class="qacts">
        ${ip?`<span class="chip chip-p">▶ PLAYING</span>`:''}
        ${id?`<span class="chip chip-d">✓ PLAYED</span>`:''}
        ${!id&&!ip?`<button class="btn btn-sm btn-l" onclick="markStatus('${s.id}','playing')">▶ PLAY</button>`:''}
        ${!id?`<button class="btn btn-sm btn-g" onclick="markStatus('${s.id}','played')">✓ PLAYED</button>`:''}
        ${!id&&idx>0?`<button class="btn btn-sm btn-g" onclick="moveUp('${s.id}',${s.rank},${data[idx-1].rank})">↑</button>`:''}
        ${!id&&idx<data.length-1&&data[idx+1].status!=='played'?`<button class="btn btn-sm btn-g" onclick="moveDn('${s.id}',${s.rank},${data[idx+1].rank})">↓</button>`:''}
        <button class="btn btn-sm btn-r" onclick="removeSong('${s.id}')">✕</button>
      </div>`;
    el.appendChild(c);
  });
}
window.markStatus=async(sid,status)=>{
  const ref=doc(db,'events',activeEvt.id,'queue',sid);
  if(status==='playing'){
    const snap=await getDocs(collection(db,'events',activeEvt.id,'queue'));
    const batch=[];snap.forEach(d=>{if(d.data().status==='playing')batch.push(updateDoc(doc(db,'events',activeEvt.id,'queue',d.id),{status:'queued'}));});
    await Promise.all(batch);
  }
  await updateDoc(ref,{status});
  toast(status==='playing'?'▶ Now Playing!':'✓ Marked as played');
};
window.moveUp=async(sid,myRank,prevRank)=>{await updateDoc(doc(db,'events',activeEvt.id,'queue',sid),{rank:prevRank-1});};
window.moveDn=async(sid,myRank,nextRank)=>{await updateDoc(doc(db,'events',activeEvt.id,'queue',sid),{rank:nextRank+1});};
window.removeSong=async sid=>{
  if(!confirm('Remove this song?'))return;
  await deleteDoc(doc(db,'events',activeEvt.id,'queue',sid));toast('Song removed');
};
</script>
</body>
</html>
